<!DOCTYPE html>
<html>
<head>
    <title>User Preferences</title>
    {% load static %}
    {% load planner_extras %}
    <link rel="stylesheet" href="/static/planner/style.css">
    <style>
    body { margin: 0; min-height: 100vh; background-color: #e8eef3; font-family: Arial, sans-serif; }
    .page-container { background: rgba(255,255,255,0.86); max-width: 900px; margin: 40px auto; padding: 24px 28px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); text-align: center; }
    .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .brand { display: flex; align-items: center; }
    .brand img { height: 40px; width: auto; border-radius: 8px; margin-right: 10px; }
    .brand-title { font-weight: bold; font-size: 18px; }
    h2 { margin-top: 0; }
    button { padding: 10px 16px; border-radius: 8px; border: none; background: #0d6efd; color: white; cursor: pointer; }
    button:hover { background: #0b5ed7; }
    table { width: 100%; background: white; margin: 0 auto; }
    th, td { text-align: center; padding: 8px; }
    </style>
</head>
<body>
    <div class="page-container">
    <div class="brand-row">
        <div class="brand">
            <img src="/static/planner/plannerly.svg" alt="Plannerly logo">
            <span class="brand-title">Daily Planner</span>
        </div>
        <div class="no-print" style="text-align:right;">
            <a href="{% url 'welcome' %}" onclick="autoSavePrefs()">Previous</a>
            | <a href="{% url 'activities' %}" onclick="autoSavePrefs()">Next</a>
            | <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
    <h2>User Preferences</h2>
    <form method="post" id="prefsForm">
        {% csrf_token %}
        <table>
            <tr>
                <th>Day</th>
                <th>Start Time</th>
                <th>End Time</th>
            </tr>
            {% for day in days %}
            <tr>
                <td>{{ day }}</td>
                <td><input type="time" name="start_{{ day }}" value="{{ existing|dict_get:day|dict_get:'start' }}"></td>
                <td><input type="time" name="end_{{ day }}" value="{{ existing|dict_get:day|dict_get:'end' }}"></td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <button type="submit">Save Preferences</button>
    </form>
    <script>
        function autoSavePrefs() {
            document.getElementById('prefsForm').submit();
        }
    </script>
    </div>
    </body>
    </html>
