<!DOCTYPE html>
<html>
<head>
    <title>Activity Selection</title>
    {% load static %}
    <link rel="stylesheet" href="/static/planner/style.css">
    <style>body{margin:0;min-height:100vh;background:#e8eef3;font-family:Arial,sans-serif}.page-container{background:rgba(255,255,255,0.86);max-width:900px;margin:40px auto;padding:24px 28px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.2);text-align:center}.brand{display:flex;align-items:center}.brand img{height:40px;border-radius:8px;margin-right:10px}.brand-title{font-weight:bold;font-size:18px}h2{margin-top:0}button{padding:10px 16px;border-radius:8px;border:none;background:#0d6efd;color:white;cursor:pointer}</style>
</head>
<body>
    <div class="page-container">
    <div class="brand-row">
        <div class="brand">
            <img src="/static/planner/plannerly.svg" alt="Plannerly logo">
            <span class="brand-title">Daily Planner</span>
        </div>
        <div class="no-print" style="text-align:right;">
            <a href="{% url 'preferences' %}" onclick="autoSaveActivities()">Previous</a>
            | <a href="{% url 'timetable' %}" onclick="autoSaveActivities()">Next</a>
            | <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
    <h2>Select Activities</h2>
    <form method="post" id="activitiesForm">
        {% csrf_token %}
        {% if error_message %}
        <p style="color: red;">{{ error_message }}</p>
        {% endif %}
        {% for activity in activities %}
            <label>
                <input type="checkbox" name="activities" value="{{ activity.name }}" {% if activity.name in selected %}checked{% endif %}>
                {{ activity.name }}
            </label><br>
        {% endfor %}
        <button type="submit">Submit</button>
    </form>
    <script>
        function autoSaveActivities() {
            document.getElementById('activitiesForm').submit();
        }
    </script>
    </div>
</body>
</html>
